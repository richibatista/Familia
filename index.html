<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Família</title>

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:'Poppins', sans-serif;
      position:relative;
      background:
      linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
      url('https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    /* EFEITO LUZ */
    body::before{
      content:'';
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
      top:-200px;
      right:-150px;
      animation:float 8s ease-in-out infinite;
    }

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(25px);}
      100%{transform:translateY(0px);}
    }

    .container{
      position:relative;
      z-index:2;
      width:420px;
      padding:45px 35px;
      text-align:center;

      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);

      border:1px solid rgba(255,255,255,0.2);
      border-radius:30px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.35),
      inset 0 0 20px rgba(255,255,255,0.05);
    }

    h1{
      font-family:'Cinzel', serif;
      color:white;
      font-size:48px;
      margin-bottom:18px;
      letter-spacing:2px;
      text-shadow:0 4px 15px rgba(0,0,0,0.4);
    }

    .frase{
      color:#f5f5f5;
      font-size:18px;
      line-height:1.8;
      margin-bottom:35px;
      font-weight:300;
      text-shadow:0 2px 10px rgba(0,0,0,0.4);
    }

    .btn{
      width:100%;
      padding:16px;
      margin:14px 0;

      border:none;
      border-radius:18px;

      font-size:21px;
      font-weight:600;
      letter-spacing:1px;

      cursor:pointer;
      transition:0.35s ease;

      color:white;

      background:linear-gradient(135deg,#ff6a88,#ff9966);

      box-shadow:
      0 6px 18px rgba(0,0,0,0.25);

      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.2);
      transition:0.5s;
    }

    .btn:hover::before{
      left:100%;
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.03);
      box-shadow:0 10px 22px rgba(0,0,0,0.35);
    }

    .sub-menu{
      display:none;
      margin-top:12px;
      animation:fadeIn 0.4s ease;
    }

    .sub-btn{
      width:90%;
      padding:14px;
      margin:10px auto;

      border:none;
      border-radius:15px;

      font-size:18px;
      font-weight:500;

      cursor:pointer;
      transition:0.3s;

      color:white;

      background:linear-gradient(135deg,#43cea2,#185a9d);

      display:block;

      box-shadow:0 4px 15px rgba(0,0,0,0.25);
    }

    .sub-btn:hover{
      transform:scale(1.04);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(-12px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:500px){

      .container{
        width:100%;
        padding:35px 25px;
      }

      h1{
        font-size:38px;
      }

      .frase{
        font-size:16px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Família</h1>

    <p class="frase">
      “A família é o nosso porto de abrigo, é sempre bom ter alguem em quem confiar.”
    </p>

    <!-- BOTÃO BIJU -->
    <button class="btn" onclick="toggleMenu()">
      Biju
    </button>

    <div class="sub-menu" id="bijuMenu">

      <button class="sub-btn"
        onclick="window.location.href='https://richibatista.github.io/Biju/'">
        Navidad
      </button>

      <button class="sub-btn"
        onclick="window.location.href='https://richibatista.github.io/Biju1/'">
        Regalo
      </button>

    </div>

    <!-- BOTÃO RAQUEL -->
    <button class="btn"
      onclick="window.location.href='https://richibatista.github.io/raquel/'">
      Raquel
    </button>
    
     </div>
  
    <!-- BOTÃO Madaa -->
    <button class="btn"
      onclick="window.location.href='https://richibatista.github.io/madaa/'">
      Madaa
    </button>

  </div>
  
    <!-- BOTÃO Xandy -->
    <button class="btn"
      onclick="window.location.href='https://richibatista.github.io/alex/'">
      Xandy
    </button>

    
  </div>

  <script>

    function toggleMenu(){

      const menu = document.getElementById("bijuMenu");

      if(menu.style.display === "block"){
        menu.style.display = "none";
      }

      else{
        menu.style.display = "block";
      }

    }

  </script>

</body>
</html>
